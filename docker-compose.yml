version: '3.8'

services:
  omni-llm-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omni-llm-proxy
    restart: unless-stopped
    
    ports:
      - "5000:5000"
    
    environment:
      - DEFAULT_PROVIDER=chatgpt
      - HEADLESS=true
      - PORT=5000
      - LOGIN_TIMEOUT=120000
      - RESPONSE_TIMEOUT=60000
    
    # Load environment from .env file
    env_file:
      - .env
    
    volumes:
      # Persist browser profiles across container restarts
      - ~/.chrome_profiles:/app/.chrome_profiles
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G
    #     reservations:
    #       cpus: '1'
    #       memory: 1G

# Optional: Add a reverse proxy (nginx) for production
# services:
#   nginx:
#     image: nginx:alpine
#     ports:
#       - "80:80"
#       - "443:443"
#     volumes:
#       - ./nginx.conf:/etc/nginx/nginx.conf:ro
#     depends_on:
#       - omni-llm-proxy

volumes:
  chrome_profiles:
    driver: local
